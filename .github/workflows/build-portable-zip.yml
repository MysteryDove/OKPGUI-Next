name: Build Portable ZIP

on:
  workflow_dispatch:
    inputs:
      webview2_fixed_runtime_url:
        description: Direct download URL to the Microsoft fixed WebView2 runtime CAB for the target architecture.
        required: true
        type: string
      artifact_name:
        description: Artifact and zip file name without extension.
        required: false
        default: okpgui-next-portable-webview2-x64
        type: string

permissions:
  contents: read

jobs:
  build-portable-windows:
    name: Build Portable Windows ZIP
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      APP_EXE_NAME: okpgui-next.exe
      PORTABLE_DIR_NAME: okpgui-next-portable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri executable without installer bundling
        run: pnpm tauri build -- --ci --no-sign --no-bundle

      - name: Assemble portable package
        id: package
        shell: pwsh
        run: |
          $artifactName = "${{ inputs.artifact_name }}"
          $portableRoot = Join-Path $env:RUNNER_TEMP "portable-output"
          $portableDir = Join-Path $portableRoot $env:PORTABLE_DIR_NAME
          $runtimeExtractRoot = Join-Path $env:RUNNER_TEMP "webview2-extracted"
          $runtimeDir = Join-Path $portableDir "webview2-runtime"
          $cabPath = Join-Path $env:RUNNER_TEMP "webview2-fixed-runtime.cab"
          $appExeSource = Join-Path "src-tauri/target/release" $env:APP_EXE_NAME
          $pdbSource = Join-Path "src-tauri/target/release" "okpgui_next.pdb"
          $resourcesSource = "src-tauri/target/release/resources"

          Remove-Item $portableRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $runtimeExtractRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $portableDir | Out-Null
          New-Item -ItemType Directory -Path $runtimeExtractRoot | Out-Null

          if (-not (Test-Path $appExeSource)) {
            throw "Built executable not found: $appExeSource"
          }

          Copy-Item $appExeSource $portableDir -Force

          if (Test-Path $pdbSource) {
            Copy-Item $pdbSource $portableDir -Force
          }

          if (Test-Path $resourcesSource) {
            Copy-Item $resourcesSource (Join-Path $portableDir "resources") -Recurse -Force
          }

          Invoke-WebRequest -Uri "${{ inputs.webview2_fixed_runtime_url }}" -OutFile $cabPath
          expand $cabPath -F:* $runtimeExtractRoot | Out-Null

          $runtimeSource = Get-ChildItem -Path $runtimeExtractRoot -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "msedgewebview2.exe") } |
            Select-Object -First 1

          if (-not $runtimeSource) {
            if (Test-Path (Join-Path $runtimeExtractRoot "msedgewebview2.exe")) {
              $runtimeSource = Get-Item $runtimeExtractRoot
            } else {
              throw "Fixed WebView2 runtime extraction did not produce msedgewebview2.exe"
            }
          }

          New-Item -ItemType Directory -Path $runtimeDir | Out-Null
          Copy-Item (Join-Path $runtimeSource.FullName "*") $runtimeDir -Recurse -Force

          $launcherContent = @"
          @echo off
          setlocal
          set "APP_DIR=%~dp0"
          set "APP_EXE=%APP_DIR%$env:APP_EXE_NAME"
          set "RUNTIME_DIR=%APP_DIR%webview2-runtime"

          if not exist "%APP_EXE%" (
            echo Missing executable: %APP_EXE%
            exit /b 1
          )

          if not exist "%RUNTIME_DIR%\msedgewebview2.exe" (
            echo Missing bundled WebView2 runtime in "%RUNTIME_DIR%"
            exit /b 1
          )

          rem Required for unpackaged fixed-runtime deployments on Windows 10 v120+.
          icacls "%RUNTIME_DIR%" /grant *S-1-15-2-2:(OI)(CI)(RX) >nul 2>nul
          icacls "%RUNTIME_DIR%" /grant *S-1-15-2-1:(OI)(CI)(RX) >nul 2>nul

          set "WEBVIEW2_BROWSER_EXECUTABLE_FOLDER=%RUNTIME_DIR%"
          "%APP_EXE%"
          set "EXIT_CODE=%ERRORLEVEL%"
          endlocal & exit /b %EXIT_CODE%
          "@
          $launcherContent = $launcherContent.TrimStart()
          Set-Content -Path (Join-Path $portableDir "Launch OKPGUI Next.cmd") -Value $launcherContent -NoNewline

          $readmeContent = @"
          Start the app with "Launch OKPGUI Next.cmd", not by launching the EXE directly.

          This package bundles a fixed WebView2 runtime in the webview2-runtime folder and points the app at that runtime at launch time.

          Notes:
          - This is a runtime-portable package, not a fully self-contained data-portable build. Tauri app data still uses the normal user profile locations unless the application code is changed.
          - The launcher applies the Windows 10 ACL workaround that fixed WebView2 runtimes require for unpackaged apps on runtime versions 120 and newer.
          - Avoid running this package from a UNC path or network share. Fixed WebView2 runtimes are not supported there.
          "@
          $readmeContent = $readmeContent.TrimStart()
          Set-Content -Path (Join-Path $portableDir "README-portable.txt") -Value $readmeContent -NoNewline

          $zipPath = Join-Path $env:RUNNER_TEMP ("{0}.zip" -f $artifactName)
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $portableDir -DestinationPath $zipPath -Force
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.zip_path }}